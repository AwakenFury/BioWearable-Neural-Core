<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioWearable Neural Core - Real-Time Telemetry</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-cyan: #00f0ff;
            --accent-green: #39ff14;
            --accent-orange: #ff9900;
            --border-color: #30363d;
            --text-main: #c9d1d9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-area h1 {
            color: var(--accent-cyan);
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-area span {
            font-size: 12px;
            color: #8b949e;
        }

        .controls-top button {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .controls-top button:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            position: relative;
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        canvas {
            width: 100%;
            height: 250px;
            background: #070a0f;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .metric-value {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-green);
            font-family: monospace;
        }

        .sidebar-controls label {
            display: block;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .sidebar-controls input[type="range"] {
            width: 100%;
            margin-bottom: 20px;
            accent-color: var(--accent-cyan);
        }

        .terminal {
            background: #000;
            color: var(--accent-green);
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>BioWearable Neural Core</h1>
            <span>ESP32-S3 Biosignal Dashboard v1.0.0</span>
        </div>
        <div class="controls-top">
            <button id="connectBtn">CONNECT WEBSERIAL</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- Telemetry & Visualization -->
        <div class="main-column">
            <div class="panel">
                <div class="panel-title">
                    <span>Live Neural/EMG Signal Stream</span>
                    <span id="statusIndicator" style="color: var(--accent-orange);">SIMULATED MODE</span>
                </div>
                <canvas id="signalCanvas"></canvas>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div>Frequency</div>
                        <div class="metric-value" id="freqVal">60.2 Hz</div>
                    </div>
                    <div class="metric-card">
                        <div>Amplitude</div>
                        <div class="metric-value" id="ampVal">1.42 mV</div>
                    </div>
                    <div class="metric-card">
                        <div>SNR</div>
                        <div class="metric-value" id="snrVal">24.5 dB</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hardware & Algorithmic Controls -->
        <div class="sidebar-column">
            <div class="panel" style="margin-bottom: 20px;">
                <div class="panel-title">Core Controls</div>
                <div class="sidebar-controls">
                    <label>
                        Neural Threshold (mV): <span id="threshOut">1.50</span>
                        <input type="range" id="threshSlider" min="0.5" max="3.5" step="0.1" value="1.5">
                    </label>
                    <label>
                        Hardware Gain Multiplier: <span id="gainOut">2.0</span>
                        <input type="range" id="gainSlider" min="1" max="5" step="0.5" value="2">
                    </label>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">System Diagnostic Log</div>
                <div class="terminal" id="logger">
                    [SYSTEM] Initializing BioWearable Core...<br>
                    [SYSTEM] Waiting for WebSerial pipeline...<br>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Canvas Config
        const canvas = document.getElementById('signalCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = canvas.offsetWidth;
        let height = canvas.height = canvas.offsetHeight;

        // Data Management 
        let signalData = Array(200).fill(height / 2);
        let threshold = 1.5;

        // Sync Sliders
        document.getElementById('threshSlider').addEventListener('input', (e) => {
            threshold = parseFloat(e.target.value);
            document.getElementById('threshOut').innerText = threshold.toFixed(2);
            logMessage(`[PARAM] Threshold shifted to ${threshold.toFixed(2)} mV`);
        });

        document.getElementById('gainSlider').addEventListener('input', (e) => {
            document.getElementById('gainOut').innerText = parseFloat(e.target.value).toFixed(1);
            logMessage(`[PARAM] Hardware Gain adjusted to ${e.target.value}x`);
        });

        // WebSerial Mock Connection Action
        document.getElementById('connectBtn').addEventListener('click', () => {
            const btn = document.getElementById('connectBtn');
            const status = document.getElementById('statusIndicator');
            if(btn.innerText === "CONNECT WEBSERIAL") {
                btn.innerText = "DISCONNECT";
                btn.style.borderColor = "var(--accent-orange)";
                btn.style.color = "var(--accent-orange)";
                status.innerText = "HARDWARE CONNECTED";
                status.style.color = "var(--accent-green)";
                logMessage("[SERIAL] Port opened successfully at 115200 baud.");
            } else {
                btn.innerText = "CONNECT WEBSERIAL";
                btn.style.borderColor = "var(--accent-cyan)";
                btn.style.color = "var(--accent-cyan)";
                status.innerText = "SIMULATED MODE";
                status.style.color = "var(--accent-orange)";
                logMessage("[SERIAL] Port disconnected by host.");
            }
        });

        function logMessage(msg) {
            const logger = document.getElementById('logger');
            logger.innerHTML += `${msg}<br>`;
            logger.scrollTop = logger.scrollHeight;
        }

        // Render Waveform
        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw Grid Lines
            ctx.strokeStyle = '#1f242c';
            ctx.lineWidth = 1;
            for(let i=0; i<width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            for(let j=0; j<height; j+=40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(width, j); ctx.stroke();
            }

            // Generate Simulated Neural Spike Matrix
            signalData.shift();
            let baseNoise = Math.sin(Date.now() * 0.005) * 15;
            let randomSpike = Math.random() > 0.97 ? (Math.random() - 0.5) * 110 : 0;
            let currentSample = (height / 2) + baseNoise + randomSpike;
            signalData.push(currentSample);

            // Update Dynamic Cards UI
            if (randomSpike !== 0) {
                document.getElementById('ampVal').innerText = ((Math.abs(randomSpike)/30)).toFixed(2) + " mV";
                if(Math.abs(randomSpike)/30 > threshold) {
                    logMessage(`[ALERT] Neural spikes crossed user threshold limit!`);
                }
            }

            // Plot Waveform Trace
            ctx.beginPath();
            ctx.strokeStyle = '#00f0ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 4;
            ctx.shadowColor = '#00f0ff';
            
            for (let x = 0; x < signalData.length; x++) {
                let y = signalData[x];
                let targetX = (x / signalData.length) * width;
                if (x === 0) ctx.moveTo(targetX, y);
                else ctx.lineTo(targetX, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // reset glow

            requestAnimationFrame(draw);
        }

        // Handle Resizing
        window.addEventListener('resize', () => {
            width = canvas.width = canvas.offsetWidth;
            height = canvas.height = canvas.offsetHeight;
        });

        // Initialize Animation Loop
        draw();
    </script>
</body>
</html>
